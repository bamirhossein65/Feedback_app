<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت فیدبک‌ها</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { font-family: 'Vazirmatn', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 antialiased pb-12">

    <header class="bg-white border-b border-slate-100 sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2.5 rounded-xl text-white">
                <i class="fa-solid fa-chart-line text-lg"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold">میز کار مدیریت</h1>
                <p class="text-xs text-slate-400">بررسی فیدبک‌های کاربران</p>
            </div>
        </div>
        <button onclick="logout()" class="flex items-center gap-2 bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2 rounded-xl text-sm">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> خروج
        </button>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
            <div class="bg-white p-5 rounded-2xl shadow-sm border">
                <p class="text-sm text-slate-500">کل فیدبک‌ها</p>
                <h3 id="totalCount" class="text-3xl font-bold mt-1">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border">
                <p class="text-sm text-slate-500">در انتظار</p>
                <h3 id="pendingCount" class="text-3xl font-bold mt-1 text-orange-600">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border">
                <p class="text-sm text-slate-500">در حال بررسی</p>
                <h3 id="inProgressCount" class="text-3xl font-bold mt-1 text-blue-600">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border">
                <p class="text-sm text-slate-500">حل شده</p>
                <h3 id="resolvedCount" class="text-3xl font-bold mt-1 text-green-600">0</h3>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <div class="px-6 py-4 border-b bg-slate-50 flex justify-between">
                <h3 class="font-bold">لیست فیدبک‌ها</h3>
                <button onclick="loadFeedbacks()" class="text-indigo-600 hover:text-indigo-700">
                    <i class="fa-solid fa-rotate"></i> بروزرسانی
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="bg-slate-100 text-xs font-medium text-slate-500">
                            <th class="p-4 text-center">ردیف</th>
                            <th class="p-4">کاربر</th>
                            <th class="p-4">وضعیت</th>
                            <th class="p-4">پیام</th>
                            <th class="p-4 text-center">عملیات</th>
                        </tr>
                    </thead>
                    <tbody id="feedbackTableBody" class="divide-y text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:8000/api/feedbacks';

        async function loadFeedbacks() {
            const token = localStorage.getItem('admin_token');
            if (!token) return window.location.href = 'login.html';

            try {
                const res = await fetch(API_BASE_URL, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) return logout();
                if (!res.ok) throw new Error();

                const feedbacks = await res.json();
                renderDashboard(feedbacks);
            } catch (e) {
                alert("خطا در بارگذاری داده‌ها");
            }
        }

        function getStatusBadge(status) {
            if (status === 'pending') return `<span class="px-3 py-1 text-xs font-medium rounded-full bg-orange-100 text-orange-700">در انتظار</span>`;
            if (status === 'in_progress') return `<span class="px-3 py-1 text-xs font-medium rounded-full bg-blue-100 text-blue-700">در حال بررسی</span>`;
            if (status === 'resolved') return `<span class="px-3 py-1 text-xs font-medium rounded-full bg-green-100 text-green-700">حل شده</span>`;
            return status;
        }

        function renderDashboard(feedbacks) {
            const tbody = document.getElementById('feedbackTableBody');
            tbody.innerHTML = '';

            let pending = 0, inProgress = 0, resolved = 0;

            if (!feedbacks || feedbacks.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center p-12 text-slate-400">هیچ فیدبکی یافت نشد</td></tr>`;
                updateStats(0, 0, 0, 0);
                return;
            }

            feedbacks.forEach((item, index) => {
                if (item.status === 'pending') pending++;
                else if (item.status === 'in_progress') inProgress++;
                else if (item.status === 'resolved') resolved++;

                const row = `
                    <tr class="hover:bg-slate-50">
                        <td class="p-4 text-center">${index + 1}</td>
                        <td class="p-4">
                            <div class="font-medium">${item.name || 'ناشناس'}</div>
                            <div class="text-xs text-slate-400">${item.email || ''}</div>
                        </td>
                        <td class="p-4">${getStatusBadge(item.status)}</td>
                        <td class="p-4 text-slate-600">${item.message}</td>
                        <td class="p-4 text-center">
                            <select onchange="updateStatus(${item.id}, this.value)" class="text-xs border rounded-lg px-2 py-1">
                                <option value="pending" ${item.status === 'pending' ? 'selected' : ''}>در انتظار</option>
                                <option value="in_progress" ${item.status === 'in_progress' ? 'selected' : ''}>در حال بررسی</option>
                                <option value="resolved" ${item.status === 'resolved' ? 'selected' : ''}>حل شده</option>
                            </select>
                            <button onclick="deleteFeedback(${item.id})" class="ml-3 text-red-500 hover:text-red-700">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });

            updateStats(feedbacks.length, pending, inProgress, resolved);
        }

        function updateStats(total, pending, inProgress, resolved) {
            document.getElementById('totalCount').innerText = total;
            document.getElementById('pendingCount').innerText = pending;
            document.getElementById('inProgressCount').innerText = inProgress;
            document.getElementById('resolvedCount').innerText = resolved;
        }

        async function updateStatus(id, newStatus) {
            const token = localStorage.getItem('admin_token');
            try {
                await fetch(`${API_BASE_URL}/${id}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });
                loadFeedbacks();
            } catch (e) { alert("خطا در تغییر وضعیت"); }
        }

        async function deleteFeedback(id) {
            if (!confirm("حذف شود؟")) return;
            const token = localStorage.getItem('admin_token');
            try {
                await fetch(`${API_BASE_URL}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadFeedbacks();
            } catch (e) { alert("خطا در حذف"); }
        }

        function logout() {
            localStorage.removeItem('admin_token');
            window.location.href = 'login.html';
        }

        // بارگذاری اولیه
        window.onload = loadFeedbacks;
    </script>
</body>
</html>
